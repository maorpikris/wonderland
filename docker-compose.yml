services:
  mapproxy:
    build:
      context: ./mapproxy
      dockerfile: dockerfile
    container_name: wonderland-mapproxy
    ports:
      - "8081:80"
    volumes:
      - ./mapproxy/mapproxy.yml:/mapproxy/config/mapproxy.yaml:ro
      - ./dev_data/mapproxy/cache:/mapproxy/config/cache_data
      - ./dev_data/mapproxy/maps:/mapproxy/maps
    networks:
      - magenim-net
    restart: unless-stopped

  postgres:
    image: postgis/postgis:16-3.4
    container_name: magenim-postgres
    ports:
      - "5435:5432"
    environment:
      POSTGRES_DB: wonderland
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - magenim-net
    restart: unless-stopped

  mediamtx:
    image: bluenviron/mediamtx:latest
    container_name: wonderland-mediamtx
    ports:
      - "8554:8554"
      - "1935:1935"
      - "8888:8888"
      - "8889:8889"
      - "9997:9997"
      - "8189:8189/udp"
      - "8199:8199"
      - "9996:9996"
    volumes:
      - ./mediamtx/mediamtx.yml:/mediamtx.yml:ro
      - ./recordings:/recordings
    networks:
      - magenim-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: wonderland-backend
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USERNAME=admin
      - DB_PASSWORD=admin
      - DB_NAME=wonderland
      - MEDIAMTX_API_URL=http://mediamtx:9997
      - MEDIAMTX_PLAYBACK_URL=http://mediamtx:9996
      - RECORDINGS_PATH=/app/recordings
      - PORT=3000
    # volumes:
    #   - ./recordings:/app/recordings
    #   - ./backend/cameras.json:/app/cameras.json
    networks:
      - magenim-net
    restart: unless-stopped

  # frontend:
  #   build:
  #     context: ./frontend
  #     dockerfile: Dockerfile
  #     args:
  #       - VITE_MAGENIM_BACKEND_URL=http://localhost:3000
  #   container_name: wonderland-frontend
  #   ports:
  #     - "80:80"
  #   # depends_on:
  #   #   - backend
  #   networks:
  #     - magenim-net
  #   restart: unless-stopped

networks:
  magenim-net:
    driver: bridge

volumes:
  postgres_data:
