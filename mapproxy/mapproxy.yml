services:
  demo:
  wmts:
  tms:
    use_grid_names: true
    origin: nw

layers:
  - name: map_shlita
    title: Map Shlita Israel
    sources: [osm_cache]
  - name: ortophoto
    title: Ortophoto
    sources: [ortophoto_cache]

caches:
  osm_cache:
    grids: [webmercator]
    sources: [osm_tiles]
    cache:
      type: file
      directory: /mapproxy/config/cache_data/osm_cache
  ortophoto_cache:
    grids: [webmercator]
    sources: [ortophoto_source]
    cache:
      type: file
      directory: /mapproxy/config/cache_data/ortophoto_cache

sources:
  osm_tiles:
    type: tile
    url: https://tile.openstreetmap.org/%(z)s/%(x)s/%(y)s.png
    grid: webmercator
    http:
      headers:
        User-Agent: mapproxy
  ortophoto_source:
    type: arcgis
    req:
      url: https://services.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/

grids:
  webmercator:
    srs: "EPSG:3857"
    origin: "nw"
    tile_size: [256, 256]
